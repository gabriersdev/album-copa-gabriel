<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tinder de Álbum da Copa | Troque figurinhas com seus amigos</title>
  
  <link rel="icon" href="https://www.jetbrains.com/favicon.ico" type="image/x-icon">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Inter:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./bootstrap.min.css">
  <link rel='stylesheet' href='./base.css'>
  <link rel="stylesheet" href="./style.css">
  
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
<main id="app">
<!--  Se não houver conexão com a API, exibir essa mensagem na tela! -->
<div class="w-100 mx-auto" v-if="apiConnected === false">
  <h1 class="d-none">Tinder de Álbum da Copa | Troque figurinhas com seus amigos</h1>
  <section class="d-flex justify-content-center align-items-center flex-column mx-auto p-3 border border-secondary" style="max-width: 600px">
    <h2 class="fs-1 fw-bold">#404</h2>
    <h3 class="fs-3 text-balance text-center">Sem conexão com a API. Por favor verifique se ela foi inicializada.</h3>
  </section>
</div>

<!-- Se não for o caso, exibir as funcionalidades da aplicação! -->
<section v-else-if="apiConnected === true">
  <div class="gallery">
    <div class="mx-auto w-100">
      <hgroup class="d-flex justify-content-center align-items-center mt-5">
        <div class="d-flex justify-content-center align-items-center flex-column">
          <span class="text-small font-inter">Seleção atual</span>
          <div class="d-flex justify-content-center align-items-center gap-2 flex-wrap">
            <h2 class="fs-3 fw-semibold p-0 mb-1 mt-0">{{ currentSelection }}</h2>
            <div class="dropdown">
              <button class="btn btn-secondary font-inter text-small dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
              <span>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-repeat mb-1" viewBox="0 0 16 16">
                  <path d="M11.534 7h3.932a.25.25 0 0 1 .192.41l-1.966 2.36a.25.25 0 0 1-.384 0l-1.966-2.36a.25.25 0 0 1 .192-.41m-11 2h3.932a.25.25 0 0 0 .192-.41L2.692 6.23a.25.25 0 0 0-.384 0L.342 8.59A.25.25 0 0 0 .534 9"/>
                  <path fill-rule="evenodd" d="M8 3c-1.552 0-2.94.707-3.857 1.818a.5.5 0 1 1-.771-.636A6.002 6.002 0 0 1 13.917 7H12.9A5 5 0 0 0 8 3M3.1 9a5.002 5.002 0 0 0 8.757 2.182.5.5 0 1 1 .771.636A6.002 6.002 0 0 1 2.083 9z"/>
                </svg>
                <span>&nbsp;Trocar</span>
              </span>
              </button>
              <ul class="dropdown-menu font-inter text-base">
                <li v-for="sel in selections" :key="sel">
                  <a class="dropdown-item" href="#" @click.prevent="fetchSelection(sel)">{{ sel }}</a>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </hgroup>
    </div>
    <div>
      <ul class="cards">
        <gsap-card
          v-for="(card, index) in cards"
          :key="index"
          :card="card"
          @trade="tradeSticker">
        </gsap-card>
      </ul>
      <div class="actions d-flex justify-content-center align-items-center gap-2 font-inter">
        <button class="prev">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-fast-forward-fill" style="rotate: 180deg" viewBox="0 0 16 16">
            <path d="M7.596 7.304a.802.802 0 0 1 0 1.392l-6.363 3.692C.713 12.69 0 12.345 0 11.692V4.308c0-.653.713-.998 1.233-.696z"/>
            <path d="M15.596 7.304a.802.802 0 0 1 0 1.392l-6.363 3.692C8.713 12.69 8 12.345 8 11.692V4.308c0-.653.713-.998 1.233-.696z"/>
          </svg>
          <span>&nbsp;Anterior</span>
        </button>
        <button class="info" data-bs-toggle="modal" data-bs-target="#infoModal">Info</button>
        <button class="next">
          <span>Próximo&nbsp;</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-fast-forward-fill" viewBox="0 0 16 16">
            <path d="M7.596 7.304a.802.802 0 0 1 0 1.392l-6.363 3.692C.713 12.69 0 12.345 0 11.692V4.308c0-.653.713-.998 1.233-.696z"/>
            <path d="M15.596 7.304a.802.802 0 0 1 0 1.392l-6.363 3.692C8.713 12.69 8 12.345 8 11.692V4.308c0-.653.713-.998 1.233-.696z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</section>

<!-- Modal de Comparação de Álbuns moved inside #app -->
<div class="modal fade font-inter" id="infoModal" tabindex="-1" aria-labelledby="infoModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-bottom border-secondary">
        <h5 class="modal-title fs-3 fw-medium text-primary" id="infoModalLabel">Comparação de Álbuns</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body text-start text-balance text-base">
        <!-- As informações agora são carregadas nativamente -->
        <album-comparison-component :album="album1"></album-comparison-component>
        <album-comparison-component :album="album2"></album-comparison-component>
        <common-stickers-component :common-stickers="commonStickers"></common-stickers-component>
        <possible-trades-component :trades="possibleTrades" @trade="tradeSticker"></possible-trades-component>
      </div>
      <div class="modal-footer border-top border-secondary">
        <button type="button" class="btn btn-primary text-base" data-bs-dismiss="modal">Fechar</button>
      </div>
    </div>
  </div>
</div>
</div>
</main>

<!-- Template -->
<template id="no-trade-message-template">
  <div class="text-base text-white text-balance">
    <p class="">
      <span class="text-danger d-inline-flex align-items-center justify-content-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-x-lg" viewBox="0 0 16 16">
          <path d="M2.146 2.854a.5.5 0 1 1 .708-.708L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8z"/>
        </svg>
      </span>&nbsp;
      <span class="font-inter">{{ message }}</span>
    </p>
  </div>
</template>

<template id="gsap-card-template">
  <li>
    <div class="card-container" :class="card.gradClass">
      <div class="card-inner-border"></div>
      <div class="card-header text-gradient">
        <span class="font-inter">Jogador #{{card.number}}</span>
      </div>
      <div class="card-center-number text-gradient">{{card.number}}</div>
      <div class="card-footer text-gradient">
        <span class="d-block font-inter">{{card.team}}</span>
      </div>
    </div>
    
    <div class="mt-3 d-flex flex-column gap-3">
      <!-- Se ambos os álbuns possuírem a mesma figurinha -->
      <no-trade-message v-if="card.album1Has && card.album2Has" message="Os dois álbuns possuem esta carta. Não é possível trocá-la."></no-trade-message>
      
      <!-- Se nenhum dos álbums possuírem a figurinha -->
      <no-trade-message v-else-if="!card.album1Has && !card.album2Has" message="Nenhum dos álbuns possuem esta carta. Não é possível trocá-la."></no-trade-message>
      
      <!-- Oferece troca, já que 1 álbum tem a figurinha e o outro não e possui duplicata -->
      <div v-else-if="(card.album1IsDuplicate && !card.album2Has) || (card.album2IsDuplicate && !card.album1Has)" style="max-width: 300px" class="mx-auto">
        <div class="d-flex flex-column gap-1">
          <button type="button" class="btn btn-primary text-base font-inter"
                  @click="doTrade(card.album1IsDuplicate ? 'Álbum #1' : 'Álbum #2', card.album1IsDuplicate ? 'Álbum #2' : 'Álbum #1')"
                  :disabled="isTrading">
            <span v-if="!isTrading" class="d-block">Transferir do {{ card.album1IsDuplicate ? 'Álbum #1' : 'Álbum #2' }}</span>
            <div v-else class="d-flex align-items-center justify-content-center gap-2">
              <div class="spinner-border text-dark spinner-border-sm" style="border-width: 3px" role="status">
                <span class="visually-hidden">Trocando...</span>
              </div>
              <span class="d-block">Trocando...</span>
            </div>
          </button>
          <span class="text-small d-inline-block text-balance">O {{ card.album1IsDuplicate ? 'Álbum #1' : 'Álbum #2' }} possui mais de uma desta carta, portanto é possível transferir.</span>
        </div>
      </div>
      
      <!-- Nao possui repetida para trocar -->
      <no-trade-message v-else message="Um dos álbuns possui esta carta, mas não tem repetidas para trocar."></no-trade-message>
    </div>
  </li>
</template>
<!-- Templates remain outside the app -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src='https://unpkg.co/gsap@3/dist/gsap.min.js'></script>
<script src='https://unpkg.com/gsap@3/dist/ScrollTrigger.min.js'></script>
<script src="./components.js"></script>
<script src="./script.js"></script>

</body>

</html>
