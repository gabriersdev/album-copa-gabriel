<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Infinite Scrolling Cards with GSAP and ScrollTrigger (continuous snap)</title>
  <link rel='stylesheet' href='./base.css'>
  <link rel="stylesheet" href="./style.css">

</head>

<body>
<div class="gallery">
  <ul class="cards">
    <li><img src="https://assets.codepen.io/16327/portrait-number-1.png" alt=""/></li>

    <li><img src="https://assets.codepen.io/16327/portrait-number-3.png" alt=""/></li>
    <li><img src="https://assets.codepen.io/16327/portrait-number-4.png" alt=""/></li>
