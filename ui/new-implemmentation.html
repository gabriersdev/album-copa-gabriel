<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cards Animados - Vue.js & CSS</title>
  
  <!-- Importando a fonte Inter do Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;1,900&display=swap" rel="stylesheet">
  
  <!-- Importando o Vue 3 via CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  
  <style>
    /* Estilos Globais da Página */
    body {
      background-color: #050505; /* Fundo escuro para destacar os cards */
      margin: 0;
      padding: 40px;
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    
    #app {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
      justify-content: center;
      max-width: 1400px;
    }
    
    /*
     * Componente do Card
     */
    .card-container {
      position: relative;
      width: 320px;
      height: 480px;
      background-color: #111;
      border-radius: 20px;
      
      /* Borda externa com gradiente */
      border: 3px solid transparent;
      background-image: linear-gradient(#0a0a0a, #0a0a0a), var(--card-gradient);
      background-origin: border-box;
      background-clip: padding-box, border-box;
      
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 24px;
      box-sizing: border-box;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
      transition: transform 0.3s ease;
    }
    
    .card-container:hover {
      transform: translateY(-10px);
    }
    
    /* Borda interna (Inner border) */
    .card-inner-border {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      bottom: 10px;
      border-radius: 12px;
      border: 2px solid transparent;
      background-image: linear-gradient(#0a0a0a, #0a0a0a), var(--card-gradient);
      background-origin: border-box;
      background-clip: padding-box, border-box;
      pointer-events: none;
      opacity: 0.6;
    }
    
    /* Utilitário para aplicar gradiente no texto */
    .text-gradient {
      background-image: var(--card-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }
    
    /* Topos e Rodapés */
    .card-header, .card-footer {
      font-size: 1.4rem;
      font-weight: 500;
      letter-spacing: -0.03em;
      z-index: 2;
    }
    
    .card-footer {
      transform: rotate(180deg);
    }
    
    /* Textos laterais (GSAP) */
    .card-side-text {
      position: absolute;
      top: 50%;
      font-size: 0.9rem;
      font-weight: 900;
      font-style: italic;
      letter-spacing: 0.05em;
      z-index: 2;
    }
    
    .side-left {
      left: 16px;
      transform: translateY(-50%) rotate(-90deg);
    }
    
    .side-right {
      right: 16px;
      transform: translateY(-50%) rotate(90deg);
    }
    
    /* Número Central Gigante */
    .card-center-number {
      font-size: 16rem;
      font-weight: 300;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-grow: 1;
      z-index: 2;
    }
    
    /*
     * As 10 Variações de Gradientes
     */
    .grad-1 {
      --card-gradient: linear-gradient(135deg, #0061ff 0%, #60efff 100%);
    }
    
    /* Card 7: Azul para Verde/Cyan */
    .grad-2 {
      --card-gradient: linear-gradient(135deg, #f12711 0%, #f5af19 100%);
    }
    
    /* Card 6: Laranja Escuro para Pêssego */
    .grad-3 {
      --card-gradient: linear-gradient(135deg, #834d9b 0%, #d04ed6 100%);
    }
    
    /* Card 5: Roxo para Rosa */
    .grad-4 {
      --card-gradient: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 99%, #FECFEF 100%);
    }
    
    /* Card 4: Rosa Claro */
    .grad-5 {
      --card-gradient: linear-gradient(135deg, #0575E6 0%, #00F260 100%);
    }
    
    /* Card 3: Azul para Ciano Vibrante */
    .grad-6 {
      --card-gradient: linear-gradient(135deg, #FF8008 0%, #FFC837 100%);
    }
    
    /* Card 2: Laranja para Amarelo */
    .grad-7 {
      --card-gradient: linear-gradient(135deg, #4776E6 0%, #8E54E9 100%);
    }
    
    /* Card 1: Violeta para Azul Escuro */
    
    /* Gradientes Extras para completar 10 */
    .grad-8 {
      --card-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
    }
    
    /* Verde Esmeralda */
    .grad-9 {
      --card-gradient: linear-gradient(135deg, #FC466B 0%, #3F5EFB 100%);
    }
    
    /* Magenta para Azul */
    .grad-10 {
      --card-gradient: linear-gradient(135deg, #c31432 0%, #240b36 100%);
    }
    
    /* Vermelho Profundo para Roxo Escuro */
  
  </style>
</head>
<body>

<!-- Instância principal do Vue -->
<div id="app">
  <!-- Renderizando a lista de cards dinamicamente -->
  <gsap-card
    v-for="(card, index) in cards"
    :key="index"
    :number="card.number"
    :gradient-class="card.gradClass">
  </gsap-card>
</div>

<script>
  const app = Vue.createApp({
    data() {
      return {
        // Array de dados iterados pelo Vue para gerar os 10 cards
        cards: [
          {number: '7', gradClass: 'grad-1'},
          {number: '6', gradClass: 'grad-2'},
          {number: '5', gradClass: 'grad-3'},
          {number: '4', gradClass: 'grad-4'},
          {number: '3', gradClass: 'grad-5'},
          {number: '2', gradClass: 'grad-6'},
          {number: '1', gradClass: 'grad-7'},
          {number: '8', gradClass: 'grad-8'},
          {number: '9', gradClass: 'grad-9'},
          {number: '0', gradClass: 'grad-10'},
        ]
      }
    }
  });
  
  // Definição do Componente Vue "gsap-card"
  app.component('gsap-card', {
    props: {
      number: {
        type: String,
        required: true
      },
      gradientClass: {
        type: String,
        required: true
      }
    },
    template: `
      <div class="card-container" :class="gradientClass">
        <div class="card-inner-border"></div>
        
        <div class="card-header text-gradient">Animate Anything</div>
        
        <div class="card-side-text side-left text-gradient">GSAP</div>
        
        <div class="card-center-number text-gradient">{{ number }}</div>
        
        <div class="card-side-text side-right text-gradient">GSAP</div>
        
        <div class="card-footer text-gradient">Animate Anything</div>
      </div>
    `
  });
  
  // Montar a aplicação no DOM
  app.mount('#app');
</script>

</body>
</html>
